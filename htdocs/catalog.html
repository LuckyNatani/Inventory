<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="img/eazyinventory_logo.jpeg">
    <title>EasyInventory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #800020 0%, #4a0e0e 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header h1 {
            font-size: 3rem;
            color: white;
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.2rem;
        }

        .logo-image {
            width: 160px;
            border-radius: 10px;
            margin: 0 auto 5px;
            display: block;
            object-fit: contain;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px;
            box-shadow: 0 10px 25px rgba(128, 0, 0, 0.3);
            border: 1px solid rgba(128, 0, 0, 0.2);
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .search-box {
            position: relative;
            flex-grow: 1;
            max-width: 400px;
        }

        .search-box input {
            width: 100%;
            padding: 15px 50px 15px 20px;
            border: none;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .search-box input:focus {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 18px;
        }

        .category-filter {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .category-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .category-btn:hover,
        .category-btn.active {
            background: rgba(255, 255, 255, 0.9);
            color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
        }

        .image-container {
            position: relative;
            height: 500px;
            overflow: hidden;
        }

        .product-images {
            display: flex;
            width: 200%;
            height: 100%;
            transition: transform 0.5s ease;
        }

        .product-image {
            width: 50%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
        }

        .product-info {
            padding: 12px 16px;
        }

        .product-name {
            font-size: 1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .product-category-price-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-category {
            display: inline-block;
            background: linear-gradient(45deg, #800020, #4a0e0e);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.6rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .product-price {
            font-size: 1.3rem;
            font-weight: 700;
            color: #800020;
            margin: 0;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 1.2rem;
        }

        .no-products {
            text-align: center;
            padding: 50px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.2rem;
        }

        /* Updated Pagination Styles */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 50px;
            flex-wrap: wrap;
        }

        .pagination button {
            min-width: 40px;
            height: 40px;
            padding: 0 15px;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pagination button:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background: rgba(0, 0, 0, 0.1);
        }

        .pagination button.active {
            background: white;
            color: #800020;
            font-weight: 700;
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2);
            border-color: white;
        }

        .pagination span.dots {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.2rem;
            margin: 0 5px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .controls {
                flex-direction: column;
            }

            .products-grid {
                grid-template-columns: 1fr;
            }

            .pagination {
                gap: 5px;
            }

            .pagination button {
                min-width: 36px;
                height: 36px;
                padding: 0 10px;
                font-size: 0.9rem;
            }
        }
    </style>
    <script src="assets/js/config.js"></script>
</head>

<body>
    <div class="container">
        <div class="header">
            <img src="/img/logo.jpeg" alt="Brand Logo" class="logo-image">
            <p>Discover our premium collection of Kurta Sets, Coord Sets, and Tunics</p>
        </div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search products...">
                <div class="search-icon">🔍</div>
            </div>

            <div class="category-filter" id="categoryButtons">
                <!-- Buttons will be dynamically generated -->
                <button class="category-btn active" data-category="all">All Products</button>
            </div>
        </div>

        <div id="productsGrid" class="products-grid">
            <div class="loading">Loading products...</div>
        </div>

        <div id="pagination" class="pagination"></div>
    </div>

    <script>
        let currentPage = 1;
        let currentCategory = 'all';
        let currentSearch = '';
        let totalPages = 1;

        const API_URL = 'api/inventory.php';
        const MASTER_API = 'api/factory_api.php?action=get_master_data&all=true'; // all=true to get names even if inactive? maybe just active. Let's stick to defaults for now, or just get all for catalog? Actually, if categories are inactive we probably shouldn't show them, so remove 'all=true' unless necessary. Default is active only.

        async function loadCategories() {
            try {
                const response = await fetch(MASTER_API);
                const data = await response.json();

                if (data.success && data.categories) {
                    const buttonContainer = document.getElementById('categoryButtons');
                    // Keep the "All Products" button
                    const allBtn = buttonContainer.querySelector('[data-category="all"]');
                    buttonContainer.innerHTML = '';
                    buttonContainer.appendChild(allBtn);

                    data.categories.forEach(cat => {
                        const btn = document.createElement('button');
                        btn.className = 'category-btn';
                        btn.dataset.category = cat.name;
                        btn.textContent = cat.name; // This ensures exact casing from DB used for display and filtering

                        btn.addEventListener('click', (e) => {
                            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                            e.target.classList.add('active');
                            currentCategory = e.target.dataset.category;
                            currentPage = 1;
                            loadProducts();
                        });

                        buttonContainer.appendChild(btn);
                    });

                    // Re-attach event listener to All Products button as it was removed/re-added or just to be safe if innerHTML cleared it (it does)
                    allBtn.addEventListener('click', (e) => {
                        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        currentCategory = 'all';
                        currentPage = 1;
                        loadProducts();
                    });
                }
            } catch (error) {
                console.error("Failed to load categories:", error);
                // Fallback to static buttons if API fails? Or just show All.
            }
        }

        async function loadProducts() {
            try {
                const params = new URLSearchParams({
                    action: 'list',
                    page: currentPage,
                    limit: 30,
                    search: currentSearch,
                    category: currentCategory
                });

                const response = await fetch(`${API_URL}?${params}`);
                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                displayProducts(data.items);
                updatePagination(data.total);

            } catch (error) {
                console.error('Error loading products:', error);
                document.getElementById('productsGrid').innerHTML =
                    '<div class="no-products">Error loading products. Please try again later.</div>';
            }
        }

        function displayProducts(products) {
            const grid = document.getElementById('productsGrid');

            if (products.length === 0) {
                grid.innerHTML = '<div class="no-products">No products found matching your criteria.</div>';
                return;
            }

            grid.innerHTML = products.map(product => {
                let price = 0;
                if (product.cost_price) {
                    const cost = parseFloat(product.cost_price) || 0;
                    price = Math.round(cost * 1.22);
                }

                const baseImgUrl = (typeof CONFIG !== 'undefined' && CONFIG.IMAGE_BASE_URL) ? CONFIG.IMAGE_BASE_URL : "assets/images/products/";
                const imgPath = product.img1 || encodeURIComponent(product.sku || '').replace(/%20/g, '%2520');
                const fullImgUrl = `${baseImgUrl}${imgPath}.webp`;

                return `
                <div class="product-card">
                    <div class="image-container">
                        <div class="product-images" id="images-${product.id}">
                            <img src="${fullImgUrl}" alt="${product.sku}" class="product-image" 
                                 onerror="this.src='https://via.placeholder.com/400x300?text=No+Image'">
                        </div>
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">${product.sku}</h3>
                        <div class="product-category-price-container">
                            <div class="product-price">₹${price.toLocaleString()}</div>
                            <span class="product-category">${product.category}</span>
                        </div>
                    </div>
                </div>
            `;
            }).join('');
        }

        function updatePagination(total) {
            const pagination = document.getElementById('pagination');
            const itemsPerPage = 30;
            totalPages = Math.ceil(total / itemsPerPage);

            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = '';

            // Previous Button
            html += `<button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>Prev</button>`;

            // Generate Page Numbers with Sliding Window
            const getRange = (current, total) => {
                const delta = 2;
                const range = [];
                const rangeWithDots = [];
                let l;

                for (let i = 1; i <= total; i++) {
                    if (i === 1 || i === total || (i >= current - delta && i <= current + delta)) {
                        range.push(i);
                    }
                }

                range.forEach(i => {
                    if (l) {
                        if (i - l === 2) {
                            rangeWithDots.push(l + 1);
                        } else if (i - l !== 1) {
                            rangeWithDots.push('...');
                        }
                    }
                    rangeWithDots.push(i);
                    l = i;
                });

                return rangeWithDots;
            };

            const pages = getRange(currentPage, totalPages);

            pages.forEach(page => {
                if (page === '...') {
                    html += `<span class="dots">...</span>`;
                } else {
                    const activeClass = page === currentPage ? 'active' : '';
                    html += `<button class="${activeClass}" onclick="changePage(${page})">${page}</button>`;
                }
            });

            // Next Button
            html += `<button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next</button>`;

            pagination.innerHTML = html;
        }

        function changePage(page) {
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                loadProducts();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function debounce(func, wait) {
            let timeout;
            return function (...args) {
                const context = this;
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(context, args), wait);
            };
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', debounce((e) => {
            currentSearch = e.target.value;
            currentPage = 1;
            loadProducts();
        }, 500));

        // Initial Load
        loadCategories(); // Load categories first to populate buttons
        loadProducts();   // Then load products
    </script>
</body>

</html>
