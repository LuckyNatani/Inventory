<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="img/eazyinventory_logo.jpeg">
    <title>Settings | Inventory Manager</title>
    <script src="assets/js/ui.js" defer></script>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link rel="stylesheet" href="assets/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/navbar.js" defer></script>
</head>

<body class="bg-gray-100">
    <!-- Navbar injected by navbar.js -->

    <div class="container mx-auto p-4 transition-all duration-300">
        <div class="bg-white rounded-xl shadow-sm p-6 mb-6 glass-card">
            <div class="mb-6">
                <h1 class="text-xl md:text-2xl font-bold text-gray-800">Settings</h1>
                <p class="text-sm text-gray-500">Manage application configuration and master data</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Master Data Card -->
                <a href="manage_master.html" class="block group" data-role="admin,production">
                    <div
                        class="bg-white rounded-xl shadow-sm p-6 border border-gray-200 hover:shadow-md hover:border-indigo-300 transition-all cursor-pointer h-full">
                        <div class="flex items-start justify-between mb-4">
                            <div
                                class="w-12 h-12 bg-indigo-50 rounded-lg flex items-center justify-center text-indigo-600">
                                <i class="fas fa-database text-xl"></i>
                            </div>
                            <span class="text-xs font-semibold text-gray-400 uppercase tracking-wide">Data</span>
                        </div>
                        <h3 class="text-lg font-bold text-gray-800 mb-2 group-hover:text-indigo-600 transition-colors">
                            Master Data</h3>
                        <p class="text-sm text-gray-600">Manage Segments, Factories, and Fabric types used throughout
                            the
                            system.</p>
                    </div>
                </a>


                <!-- Manage Users Link -->
                <a href="users.html" class="block group" data-role="admin,sub-admin">
                    <div
                        class="bg-white rounded-xl shadow-sm p-6 border border-gray-200 hover:shadow-md hover:border-indigo-300 transition-all cursor-pointer h-full">
                        <div class="flex items-start justify-between mb-4">
                            <div
                                class="w-12 h-12 bg-indigo-50 rounded-lg flex items-center justify-center text-indigo-600">
                                <i class="fas fa-users-cog text-xl"></i>
                            </div>
                            <span class="text-xs font-semibold text-gray-400 uppercase tracking-wide">Admin</span>
                        </div>
                        <h3 class="text-lg font-bold text-gray-800 mb-2 group-hover:text-indigo-600 transition-colors">
                            Manage Users</h3>
                        <p class="text-sm text-gray-600">View, Add, Edit, and Delete system users. Manage roles and
                            profiles.</p>
                    </div>
                </a>

            </div>
        </div>
    </div>



    <script src="assets/js/settings.js"></script>
</body>

</html>
