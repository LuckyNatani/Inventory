<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/jpeg" href="../img/eazyinventory_logo.jpeg">
    <title>Picking Item</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link rel="stylesheet" href="../assets/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/ui.js" defer></script>
    <style>
        .rack-badge {
            background: #FEF3C7;
            color: #92400E;
            border: 1px solid #F59E0B;
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen flex flex-col overflow-hidden font-sans">
    <!-- Navbar injected by navbar.js -->

    <!-- VIEW 1: LIST VIEW -->
    <div id="listView" class="flex flex-col h-full w-full transition-transform duration-300">
        <!-- Header -->
        <header
            class="bg-white text-slate-900 p-4 shadow-sm flex justify-between items-center flex-shrink-0 z-30 border-b border-gray-100">
            <button onclick="history.back()" class="text-slate-400 hover:text-slate-900 transition-colors"><i
                    class="fas fa-arrow-left text-xl"></i></button>
            <div class="flex flex-col items-center">
                <h1 class="font-bold text-xl text-slate-800 tracking-normal">Picklist #<span id="picklistId"
                        class="font-mono text-indigo-700"></span></h1>
                <span id="picklistDate" class="text-xs text-slate-500 font-medium"></span>
            </div>
            <div class="w-8"></div> <!-- Spacer for centering -->
        </header>

        <!-- Filter Bar -->
        <div class="bg-white border-b border-gray-100 p-3 flex-shrink-0">
            <div class="flex gap-2 overflow-x-auto no-scrollbar p-1" id="filterContainer">
                <button onclick="applyFilter('all')"
                    class="filter-btn whitespace-nowrap px-4 py-2 rounded-full text-xs font-bold uppercase tracking-wider bg-slate-800 text-white shadow-md transition-all"
                    data-filter="all">All</button>
                <button onclick="applyFilter('pending')"
                    class="filter-btn whitespace-nowrap px-4 py-2 rounded-full text-xs font-bold uppercase tracking-wider bg-white text-slate-500 border border-slate-200 hover:bg-slate-50 transition-all"
                    data-filter="pending">Pending</button>
                <!-- Partial Filter Removed -->
            </div>
        </div>

        <!-- Vertical List -->
        <div class="flex-1 overflow-y-auto p-3 space-y-3" id="listContainer">
            <!-- Items rendered here -->
        </div>

        <!-- Summary Button (Floating) -->
        <div class="p-4 bg-white border-t border-gray-200 flex-shrink-0">
            <button onclick="goToSummary()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold shadow-lg shadow-indigo-200 active:scale-95
            transition-all hover:bg-indigo-700 flex justify-center items-center gap-2">
                <span>View Summary</span> <i class="fas fa-chevron-right text-xs"></i>
            </button>
        </div>
    </div>

    <!-- VIEW 2: DETAIL VIEW (MODAL) -->
    <div id="detailView"
        class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm transition-opacity duration-300 opacity-0 pointer-events-none">

        <!-- Modal Card -->
        <div onclick="event.stopPropagation()"
            class="bg-white w-full max-w-lg mx-4 rounded-2xl shadow-2xl flex flex-col max-h-[85vh] overflow-hidden transform transition-all duration-300 scale-95"
            id="modalCard">

            <!-- Header -->
            <div class="p-3 flex justify-between items-center border-b border-gray-100 flex-shrink-0">
                <span class="font-bold text-gray-500 text-sm">Picking Item</span>
                <button onclick="closePickModal()"
                    class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 active:bg-gray-200 hover:bg-gray-200 transition-colors">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <!-- Content -->
            <div class="flex-1 overflow-y-auto flex flex-col">
                <!-- Image -->
                <div class="h-[25vh] bg-gray-50 flex items-center justify-center relative p-4 flex-shrink-0">
                    <img id="detailImage" src="" class="max-h-full max-w-full object-contain drop-shadow-xl">
                </div>

                <!-- Details -->
                <div class="p-4 flex-1 flex flex-col">
                    <div class="mb-4 text-center">
                        <h2 id="detailSku"
                            class="text-3xl font-bold text-slate-800 tracking-normal leading-none mb-2 font-mono">
                        </h2>
                        <div
                            class="flex items-center justify-center gap-2 text-sm font-bold text-slate-500 uppercase tracking-widest">
                            <span id="detailSize"></span>
                        </div>
                        <div id="detailRack" class="flex flex-wrap gap-2 justify-center mt-2"></div>
                    </div>

                    <div class="mb-6">
                        <div
                            class="flex justify-between text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">
                            <span>Picking Progress</span>
                            <span id="progressLabel" class="text-slate-700">0 / 5</span>
                        </div>
                        <div class="h-3 bg-gray-100 rounded-full overflow-hidden flex">
                            <div id="progBarMain" class="h-full bg-indigo-500 transition-all duration-300 w-0"></div>
                            <div id="progBarRet" class="h-full bg-orange-500 transition-all duration-300 w-0"></div>
                            <div id="progBarSub" class="h-full bg-purple-500 transition-all duration-300 w-0"></div>
                        </div>
                    </div>

                    <!-- Quantity Controls -->
                    <div class="flex flex-col gap-4 mb-auto">
                        <!-- From Inventory -->
                        <div class="bg-indigo-50/50 p-4 rounded-2xl border border-indigo-100/50 shadow-sm">
                            <div class="flex items-center justify-between mb-3">
                                <span class="text-indigo-900 font-bold text-xs uppercase tracking-wider"><i
                                        class="fas fa-boxes mr-1 opacity-70"></i> Main Inventory</span>
                            </div>
                            <div class="flex items-center gap-3 justify-center">
                                <button onclick="adjustQty('inv', -1)"
                                    class="w-12 h-12 rounded-xl bg-white text-2xl font-bold text-indigo-600 flex items-center justify-center active:bg-indigo-50 active:scale-95 transition-all shadow-sm border border-indigo-200 hover:border-indigo-300">-</button>
                                <div
                                    class="w-24 h-12 flex items-center justify-center bg-white rounded-xl border border-indigo-200">
                                    <input type="number" id="pickedQtyInv"
                                        class="w-full text-center text-2xl font-bold text-indigo-900 bg-transparent focus:outline-none"
                                        onchange="manualQtyChange('inv')" onfocus="this.select()">
                                </div>
                                <button onclick="adjustQty('inv', 1)"
                                    class="w-12 h-12 rounded-xl bg-indigo-600 text-2xl font-bold text-white flex items-center justify-center active:bg-indigo-700 active:scale-95 transition-all shadow-lg shadow-indigo-200 hover:bg-indigo-700">+</button>
                            </div>
                        </div>

                        <!-- From Return -->
                        <div class="bg-orange-50/50 p-4 rounded-2xl border border-orange-100/50 shadow-sm">
                            <div class="flex items-center justify-between mb-3">
                                <span class="text-orange-900 font-bold text-xs uppercase tracking-wider"><i
                                        class="fas fa-undo mr-1 opacity-70"></i> From Return</span>
                            </div>
                            <div class="flex items-center gap-3 justify-center">
                                <button onclick="adjustQty('ret', -1)"
                                    class="w-12 h-12 rounded-xl bg-white text-2xl font-bold text-orange-600 flex items-center justify-center active:bg-orange-50 active:scale-95 transition-all shadow-sm border border-orange-200 hover:border-orange-300">-</button>
                                <div
                                    class="w-24 h-12 flex items-center justify-center bg-white rounded-xl border border-orange-200">
                                    <input type="number" id="pickedQtyRet"
                                        class="w-full text-center text-2xl font-bold text-orange-900 bg-transparent focus:outline-none"
                                        onchange="manualQtyChange('ret')" onfocus="this.select()">
                                </div>
                                <button onclick="adjustQty('ret', 1)"
                                    class="w-12 h-12 rounded-xl bg-orange-500 text-2xl font-bold text-white flex items-center justify-center active:bg-orange-600 active:scale-95 transition-all shadow-lg shadow-orange-200 hover:bg-orange-600">+</button>
                            </div>
                        </div>
                    </div>

                    <!-- Substituted (Read Only) -->
                    <!-- Substituted (Read Only) -->
                    <div id="subCard"
                        class="mt-4 bg-purple-50 p-3 rounded-xl border border-purple-100 hidden shadow-sm">
                        <!-- Row 1: Header + Qty -->
                        <div class="flex items-center justify-between mb-2">
                            <div class="flex items-center gap-2">
                                <span
                                    class="w-6 h-6 flex items-center justify-center bg-white text-purple-600 rounded-full shadow-sm">
                                    <i class="fas fa-exchange-alt text-[10px]"></i>
                                </span>
                                <span
                                    class="text-[10px] text-purple-500 font-bold uppercase tracking-wider">Substituted</span>
                            </div>
                            <div class="text-xs text-purple-900 font-bold uppercase">
                                Qty: <span id="pickedQtySub" class="text-base font-bold ml-1">0</span>
                            </div>
                        </div>

                        <!-- Row 2: Details -->
                        <div class="bg-white/60 rounded-lg p-2 border border-purple-100">
                            <div class="flex items-start gap-2">
                                <span
                                    class="text-[10px] text-purple-400 font-bold uppercase tracking-wider mt-0.5 whitespace-nowrap">Details:</span>
                                <span id="subDetailsText"
                                    class="text-sm font-bold text-purple-900 font-mono break-words leading-tight"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>


            <!-- Bottom Actions -->
            <div class="p-3 bg-white border-t border-gray-100 flex flex-col gap-2 flex-shrink-0">
                <div class="flex gap-2">
                    <button onclick="openSubModal()" id="btnOpenSub"
                        class="flex-1 bg-purple-50 text-purple-600 py-3 rounded-xl font-bold text-sm active:bg-purple-100 transition-colors hover:bg-purple-100 disabled:opacity-50 disabled:cursor-not-allowed">
                        Substitute
                    </button>
                    <!-- Not Found Button Removed -->
                </div>
                <button onclick="confirmPick()"
                    class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-base shadow-lg shadow-indigo-200 active:scale-95 transition-transform flex items-center justify-center gap-2 hover:bg-indigo-700">
                    Confirm Pick <i class="fas fa-check"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- VIEW 3: SUMMARY VIEW -->
    <div id="summaryView" class="hidden flex flex-col h-full w-full bg-gray-100 items-center overflow-y-auto">
        <div class="flex-1 p-6 flex flex-col justify-center items-center text-center w-full max-w-md mx-auto">
            <div class="bg-white rounded-full p-6 shadow-lg mb-6 animate-bounce-in">
                <i class="fas fa-check-circle text-6xl text-green-500"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 mb-2">#<span id="sumPicklistId"></span> Picking Complete!</h1>

            <div class="bg-white rounded-xl shadow-md w-full overflow-hidden mb-8 glass-card">
                <div class="p-4 border-b border-gray-100 flex justify-between items-center">
                    <span class="text-gray-600">Total Items</span>
                    <span class="font-bold text-lg" id="sumTotal">0</span>
                </div>
                <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-green-50">
                    <span class="text-green-800">Fully Picked</span>
                    <span class="font-bold text-lg text-green-700" id="sumPicked">0</span>
                </div>
                <!-- Partial Removed -->
                <!-- Not Found Removed -->
                <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                    <span class="text-gray-800">Pending</span>
                    <span class="font-bold text-lg text-gray-700" id="sumNotPicked">0</span>
                </div>
            </div>

            <div class="w-full space-y-3">
                <button onclick="backToList()"
                    class="w-full bg-white text-indigo-600 border-2 border-indigo-600 py-3 rounded-xl font-bold shadow-sm active:scale-95 transition-all hover:bg-indigo-50">
                    Review / Edit Picklist
                </button>
                <button onclick="submitPicklistAjax()"
                    class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-lg active:scale-95 transition-all hover:bg-indigo-700">
                    Submit Picklist
                </button>
            </div>
        </div>
    </div>

    <!-- VIEW 4: SUBSTITUTION MODAL -->
    <div id="subModal"
        class="fixed inset-0 z-[60] flex items-center justify-center bg-black/60 backdrop-blur-sm hidden transition-opacity duration-300">
        <div class="bg-white w-full max-w-lg mx-4 rounded-2xl shadow-2xl flex flex-col max-h-[90vh] overflow-hidden transform transition-all"
            id="subModalCard">
            <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h3 class="font-bold text-lg text-gray-800">Substitute Item</h3>
                <button onclick="closeSubModal()"
                    class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-gray-600 hover:bg-gray-300"><i
                        class="fas fa-times"></i></button>
            </div>
            <div class="p-4 flex-1 overflow-y-auto">
                <!-- Original Item Info -->
                <div class="bg-indigo-50 border border-indigo-100 p-3 rounded-xl mb-4 text-sm">
                    <div class="flex justify-between mb-1"><span class="text-indigo-600 font-medium">Original
                            SKU:</span> <span id="subOrigSku" class="font-bold font-mono text-gray-800"></span></div>
                    <div class="flex justify-between"><span class="text-indigo-600 font-medium">Size:</span> <span
                            id="subOrigSize" class="font-bold text-gray-800"></span></div>
                    <div class="flex justify-between mt-1"><span class="text-indigo-600 font-medium">Qty Pending:</span>
                        <span id="subOrigQty" class="font-bold text-gray-800"></span>
                    </div>
                </div>

                <!-- Search -->
                <div class="flex gap-2 mb-4">
                    <input type="text" id="subSearchInput"
                        class="flex-1 p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-medium"
                        placeholder="Search SKU...">
                    <button onclick="searchSub()" class="bg-indigo-600 text-white px-4 rounded-xl font-bold"><i
                            class="fas fa-search"></i></button>
                </div>

                <!-- Results -->
                <div id="subResults"
                    class="space-y-2 mb-4 max-h-40 overflow-y-auto hidden bg-gray-50 p-2 rounded-xl border border-gray-100">
                </div>

                <!-- Selection Form -->
                <div id="subSelection" class="hidden border-t border-gray-100 pt-4 animate-fade-in-up">
                    <h4 class="font-bold text-gray-800 mb-3 flex items-center gap-2"><i
                            class="fas fa-check-circle text-green-500"></i> Selected Substitute</h4>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1">SKU</label>
                            <div id="selSubSku"
                                class="font-bold font-mono text-lg text-gray-900 bg-gray-50 p-2 rounded-lg border border-gray-200">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 mb-1">Size & Stock</label>
                                <select id="selSubSize"
                                    class="w-full p-2 border border-gray-200 rounded-lg bg-white font-medium"></select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 mb-1">Qty to Sub</label>
                                <input type="number" id="selSubQty"
                                    class="w-full p-2 border border-gray-200 rounded-lg font-bold">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1">Reason</label>
                            <input type="text" id="subReason"
                                class="w-full p-2 border border-gray-200 rounded-lg text-sm"
                                placeholder="Reason (e.g. OOS)">
                        </div>
                        <button onclick="confirmSub()"
                            class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-100 mt-2 transition-transform active:scale-95">Confirm
                            Substitution</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const picklistId = urlParams.get('id');
        const userId = localStorage.getItem('userId');

        if (!userId) window.location.href = '../login.html';
        document.getElementById('picklistId').textContent = picklistId;

        // Fetch Picklist Details (Date)
        fetch(`../api/picklist.php?action=list&picklist_id=${picklistId}`)
            .then(res => res.json())
            .then(data => {
                if (data && data.length > 0) {
                    const p = data[0];
                    const d = new Date(p.upload_date).toLocaleDateString();
                    document.getElementById('picklistDate').textContent = d;
                }
            });

        let items = [];
        let currentFilter = 'all';
        let selectedIndex = -1;

        function fetchItems() {
            fetch(`../api/picklist.php?action=items&picklist_id=${picklistId}`)
                .then(res => res.json())
                .then(data => {
                    items = data.sort((a, b) => {
                        // Sort pending first
                        if (a.status === 'pending' && b.status !== 'pending') return -1;
                        if (a.status !== 'pending' && b.status === 'pending') return 1;
                        return (a.rack_location || '').localeCompare(b.rack_location || '');
                    });
                    renderList();
                });
        }

        function renderList() {
            const container = document.getElementById('listContainer');
            const filteredItems = items.filter(item => {
                if (currentFilter === 'all') return true;
                if (currentFilter === 'pending') {
                    // Include pending and (formerly not_picked, now just pending)
                    return ['pending'].includes(item.status);
                }
                return item.status === currentFilter;
            });

            if (filteredItems.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-gray-400">No items found</div>`;
                return;
            }

            container.innerHTML = filteredItems.map((item, index) => {
                const originalIndex = items.indexOf(item);

                // Status Configuration
                let statusConfig = {
                    bg: 'bg-white', border: 'border-slate-100', text: 'text-slate-600',
                    badge: 'bg-gray-100 text-gray-600', badgeText: 'Pending',
                    btn: 'bg-indigo-600 text-white shadow-indigo-200 hover:bg-indigo-700', btnText: 'Pick'
                };

                if (item.status === 'picked') {
                    statusConfig = {
                        bg: 'bg-emerald-50/40', border: 'border-emerald-100', text: 'text-emerald-800',
                        badge: 'bg-emerald-100 text-emerald-700', badgeText: 'Picked',
                        btn: 'bg-white border text-emerald-600 border-emerald-200 hover:bg-emerald-50', btnText: 'Edit'
                    };
                } else if (item.status === 'not_found') {
                    statusConfig = {
                        bg: 'bg-rose-50/40', border: 'border-rose-100', text: 'text-rose-800',
                        badge: 'bg-rose-100 text-rose-700', badgeText: 'Not Found',
                        btn: 'bg-white border text-rose-600 border-rose-200 hover:bg-rose-50', btnText: 'Edit'
                    };
                } else if (item.status === 'substituted') {
                    statusConfig = {
                        bg: 'bg-violet-50/40', border: 'border-violet-100', text: 'text-violet-800',
                        badge: 'bg-violet-100 text-violet-700', badgeText: 'Substituted',
                        btn: 'bg-white border text-violet-600 border-violet-200 hover:bg-violet-50', btnText: 'Done'
                    };
                }

                // Racks
                const racks = (item.rack_location || '').split(',').map(r => r.trim()).filter(r => r);
                const uniqueRacks = [...new Set(racks)];
                const rackHtml = uniqueRacks.length > 0
                    ? uniqueRacks.map(r => `<span class="px-2 py-0.5 rounded text-[10px] font-bold bg-slate-100 text-slate-600 border border-slate-200">${r}</span>`).join('')
                    : '<span class="px-2 py-0.5 rounded text-[10px] font-bold bg-slate-100 text-slate-400">NO RACK</span>';

                // Image
                let baseImgUrl = (typeof CONFIG !== 'undefined' && CONFIG.IMAGE_BASE_URL) ? CONFIG.IMAGE_BASE_URL : "../assets/images/products/";
                if (!baseImgUrl.startsWith('/') && !baseImgUrl.startsWith('http') && !baseImgUrl.startsWith('..')) {
                    baseImgUrl = "../" + baseImgUrl;
                }
                const imgPath = item.image_url || encodeURIComponent(item.sku || '').replace(/%20/g, '%2520');
                const fullImgUrl = `${baseImgUrl}${imgPath}.webp`;

                const mainPicked = (item.quantity_picked || 0) - (item.quantity_return || 0);

                return `
                <div class="relative group transition-all duration-300 transform hover:-translate-y-0.5">
                    <!-- Status Indicator Line -->
                    <div class="absolute left-0 top-4 bottom-4 w-1 rounded-r ${statusConfig.badge.split(' ')[0]}"></div>
                    
                    <div class="ml-3 bg-white rounded-2xl p-4 shadow-sm border ${statusConfig.border} hover:shadow-md transition-shadow">
                        <div class="flex gap-4">
                            <!-- Image -->
                            <div class="w-20 h-24 bg-gray-50 rounded-xl overflow-hidden shadow-inner flex-shrink-0 relative">
                                <img src="${fullImgUrl}" onerror="this.src='../assets/img/placeholder.png'" class="w-full h-full object-cover">
                            </div>

                            <!-- Content -->
                            <div class="flex-1 min-w-0 flex flex-col justify-between">
                                <div>
                                    <div class="flex justify-between items-start mb-1">
                                        <h3 class="font-bold text-lg text-slate-800 leading-tight font-mono tracking-tight truncate pr-2">${item.sku}</h3>
                                        <span class="flex-shrink-0 px-2 py-0.5 rounded-full text-[10px] uppercase font-bold tracking-widest ${statusConfig.badge}">${statusConfig.badgeText}</span>
                                    </div>
                                    <div class="flex flex-wrap gap-1 mb-2 opacity-80">
                                        ${rackHtml}
                                    </div>
                                </div>

                                <div class="flex items-end justify-between gap-2">
                                    <div class="flex items-center gap-3">
                                        <div class="flex flex-col">
                                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Size</span>
                                            <span class="font-bold text-slate-700 text-sm">${item.size}</span>
                                        </div>
                                        <div class="w-px h-6 bg-slate-100"></div>
                                        <div class="flex flex-col">
                                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Qty</span>
                                            <span class="font-bold text-slate-900 text-lg">${item.quantity_required}</span>
                                        </div>
                                    </div>
                                    
                                    <button onclick="openPickModal(${originalIndex})" 
                                        class="px-5 py-2 rounded-lg font-bold text-sm shadow-sm transition-all active:scale-95 whitespace-nowrap ${statusConfig.btn}">
                                        ${statusConfig.btnText}
                                    </button>
                                </div>
                            </div>
                        </div>

                        ${!['pending', 'not_found'].includes(item.status) ? `
                        <div class="mt-3 pt-3 border-t border-slate-50 flex gap-3 text-xs font-medium">
                            ${mainPicked > 0 ? `<span class="text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded flex items-center gap-1"><i class="fas fa-check-circle text-[10px]"></i> Main: ${mainPicked}</span>` : ''}
                            ${(item.quantity_return > 0) ? `<span class="text-orange-600 bg-orange-50 px-2 py-0.5 rounded flex items-center gap-1"><i class="fas fa-undo text-[10px]"></i> Ret: ${item.quantity_return}</span>` : ''}
                            ${(item.substituted_quantity > 0) ? `<span class="text-violet-600 bg-violet-50 px-2 py-0.5 rounded flex items-center gap-1"><i class="fas fa-exchange-alt text-[10px]"></i> Sub: ${item.substituted_quantity}</span>` : ''}
                            ${(item.quantity_pending > 0) ? `<span class="text-slate-500 bg-slate-50 px-2 py-0.5 rounded flex items-center gap-1"><i class="fas fa-clock text-[10px]"></i> Left: ${item.quantity_pending}</span>` : ''}
                        </div>
                        ` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        function openPickModal(index) {
            selectedIndex = index;
            const item = items[index];
            window.currentItemId = item.item_id; // Store ID for refresh tracking

            let baseImgUrl = (typeof CONFIG !== 'undefined' && CONFIG.IMAGE_BASE_URL) ? CONFIG.IMAGE_BASE_URL :
                "../assets/images/products/";
            if (!baseImgUrl.startsWith('/') && !baseImgUrl.startsWith('http') && !baseImgUrl.startsWith('..')) {
                baseImgUrl = "../" + baseImgUrl;
            }
            const imgPath = item.image_url || encodeURIComponent(item.sku || '').replace(/%20/g, '%2520');
            const fullImgUrl = `${baseImgUrl}${imgPath}.webp`;

            // Populate Data
            document.getElementById('detailImage').src = fullImgUrl;
            document.getElementById('detailSku').textContent = item.sku;
            document.getElementById('detailSize').textContent = `Size: ${item.size} | Qty: ${item.quantity_required}`;

            // Handle multiple racks for detail view
            const racks = (item.rack_location || 'UNKNOWN').split(',').map(r => r.trim()).filter(r => r);
            const uniqueRacks = [...new Set(racks)];

            const rackContainer = document.getElementById('detailRack');
            rackContainer.className = 'flex flex-wrap gap-2';
            rackContainer.innerHTML = uniqueRacks.map(r =>
                `<span class="rack-badge px-3 py-1 rounded-lg font-bold text-sm shadow-sm">${r}</span>`
            ).join('');

            // Init Quantity
            // Use values from item directly to respect partial/returns even if status seems off
            let totalPicked = parseInt(item.quantity_picked || 0);
            let retPicked = parseInt(item.quantity_return || 0);

            // If completely fresh (pending and no interaction), default logic (User picking full?)
            // But if user has entered 0 return and 0 picked, it is pending.
            // If user has 5 return, but status is pending? (Shouldn't happen, but safeguard).

            // Calculate Inventory Picked
            let invPicked = Math.max(0, totalPicked - retPicked);

            // If everything is 0 and status is pending, we can default to Suggested Full Pick?
            // "Default Inventory to (TotalPicked - ReturnPicked) OR Required if pending"
            // The requirement says: "Ret shows 5 quantity but when clicked on edit it shows zero return and 5 remaining"
            // This means we must trust the item.quantity_return.
            if (['pending'].includes(item.status) && totalPicked === 0 && retPicked === 0) {
                const subQty = parseInt(item.substituted_quantity || 0);
                invPicked = Math.max(0, item.quantity_required - subQty);
                retPicked = 0;
            }

            document.getElementById('pickedQtyInv').value = invPicked;
            document.getElementById('pickedQtyRet').value = retPicked;
            // Set substituted qty
            // Set substituted qty (Committed + Pending)
            const subQty = parseInt(item.substituted_quantity || 0);
            const pendingSub = item.pendingSubstitution ? parseInt(item.pendingSubstitution.substitute_quantity) : 0;
            const totalSub = subQty + pendingSub;

            document.getElementById('pickedQtySub').textContent = totalSub;

            let det = item.substituted_details || 'N/A';
            if (item.pendingSubstitution) {
                if (det === 'N/A') det = '';
                else det += ', ';
                det += `${item.pendingSubstitution.substitute_sku} (${item.pendingSubstitution.substitute_size}) [PENDING]`;
            }
            document.getElementById('subDetailsText').textContent = det;

            if (totalSub > 0) document.getElementById('subCard').classList.remove('hidden');
            else document.getElementById('subCard').classList.add('hidden');

            // Initial button state
            updatePickButtonState();

            updateProgress();

            // Show Modal
            const modal = document.getElementById('detailView');
            const card = document.getElementById('modalCard');

            modal.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                card.classList.remove('scale-95');
                card.classList.add('scale-100');
            }, 10);
        }

        function closePickModal() {
            const modal = document.getElementById('detailView');
            const card = document.getElementById('modalCard');

            // Reset sub card visibility on close? No need, it is re-initialized in openPickModal
            card.classList.remove('scale-100');
            card.classList.add('scale-95');
            modal.classList.add('opacity-0', 'pointer-events-none');

            selectedIndex = -1;
        }

        // Close modal when clicking outside
        document.getElementById('detailView').addEventListener('click', function (e) {
            if (e.target === this) {
                closePickModal();
            }
        });

        function adjustQty(type, delta) {
            const invInput = document.getElementById('pickedQtyInv');
            const retInput = document.getElementById('pickedQtyRet');
            const item = items[selectedIndex];

            let invVal = parseInt(invInput.value) || 0;
            let retVal = parseInt(retInput.value) || 0;

            if (type === 'inv') {
                invVal += delta;
                if (invVal < 0) invVal = 0;
            } else if (type === 'ret') {
                retVal += delta;
                if (retVal < 0) retVal = 0;
            }

            // Cap Total (Inv + Ret + Sub) <= Required
            const subVal = parseInt(document.getElementById('pickedQtySub').textContent) || 0;
            let total = invVal + retVal + subVal;

            if (total > item.quantity_required) {
                const maxAllowed = Math.max(0, item.quantity_required - subVal);
                // If we exceeded, revert or clamp
                if (type === 'inv') invVal = Math.max(0, maxAllowed - retVal);
                if (type === 'ret') retVal = Math.max(0, maxAllowed - invVal);
            }

            invInput.value = invVal;
            retInput.value = retVal;

            updatePickButtonState();
            updateProgress();
        }

        function manualQtyChange(type) {
            const item = items[selectedIndex];
            const invInput = document.getElementById('pickedQtyInv');
            const retInput = document.getElementById('pickedQtyRet');

            let invVal = parseInt(invInput.value) || 0;
            let retVal = parseInt(retInput.value) || 0;

            if (invVal < 0) invVal = 0;
            if (retVal < 0) retVal = 0;

            const subVal = parseInt(document.getElementById('pickedQtySub').textContent) || 0;
            let currentTotal = invVal + retVal + subVal;

            if (currentTotal > item.quantity_required) {
                const maxAllowed = Math.max(0, item.quantity_required - subVal);
                if (type === 'inv') {
                    invVal = Math.max(0, maxAllowed - retVal);
                } else {
                    retVal = Math.max(0, maxAllowed - invVal);
                }
            }

            invInput.value = invVal;
            retInput.value = retVal;

            updatePickButtonState();
            updateProgress();
        }

        function updateProgress() {
            const item = items[selectedIndex];
            const invVal = parseInt(document.getElementById('pickedQtyInv').value) || 0;
            const retVal = parseInt(document.getElementById('pickedQtyRet').value) || 0;
            const subVal = parseInt(document.getElementById('pickedQtySub').textContent) || 0;

            const total = item.quantity_required;

            const pInv = (invVal / total) * 100;
            const pRet = (retVal / total) * 100;
            const pSub = (subVal / total) * 100;

            document.getElementById('progBarMain').style.width = `${Math.min(100, pInv)}%`;
            document.getElementById('progBarRet').style.width = `${Math.min(100, pRet)}%`;
            document.getElementById('progBarSub').style.width = `${Math.min(100, pSub)}%`;

            const currentTotal = invVal + retVal + subVal;
            document.getElementById('progressLabel').textContent = `${currentTotal} / ${total}`;
        }

        function markNotFound() {
            if (confirm("Mark this item as NOT FOUND?")) {
                submitPick(0, 0, 'not_found'); // 0 total, 0 return
            }
        }

        function updatePickButtonState() {
            const item = items[selectedIndex];
            const invVal = parseInt(document.getElementById('pickedQtyInv').value) || 0;
            const retVal = parseInt(document.getElementById('pickedQtyRet').value) || 0;
            const subVal = parseInt(document.getElementById('pickedQtySub').textContent) || 0;

            const currentTotal = invVal + retVal + subVal;
            const remaining = item.quantity_required - currentTotal;
            const btn = document.querySelector('button[onclick="confirmPick()"]');
            const btnSub = document.getElementById('btnOpenSub');

            // 1. Update Sub Button
            if (btnSub) {
                btnSub.disabled = remaining <= 0;
                // Change text if sub exists
                const subVal = parseInt(document.getElementById('pickedQtySub').textContent) || 0;
                if (subVal > 0 || item.pendingSubstitution) {
                    btnSub.textContent = "Edit Substitution";
                } else {
                    btnSub.textContent = "Substitute";
                }
            }

            // 2. Update Confirm Button
            // Reset classes
            btn.className = "w-full py-4 rounded-xl font-bold text-base shadow-lg active:scale-95 transition-transform flex items-center justify-center gap-2 text-white";

            if (remaining > 0) {
                // Pending State
                btn.classList.add('bg-yellow-500', 'shadow-yellow-200', 'hover:bg-yellow-600');
                btn.innerHTML = `Confirm Pick (Leave ${remaining} Pending) <i class="fas fa-exclamation-triangle"></i>`;
            } else {
                // Complete State
                btn.classList.add('bg-indigo-600', 'shadow-indigo-200', 'hover:bg-indigo-700');
                btn.innerHTML = `Confirm Pick <i class="fas fa-check"></i>`;
            }
        }

        async function confirmPick() {
            const item = items[selectedIndex];
            const invVal = parseInt(document.getElementById('pickedQtyInv').value) || 0;
            const retVal = parseInt(document.getElementById('pickedQtyRet').value) || 0;
            // pendingSubstitution might be set, or existing subs
            const subVal = parseInt(document.getElementById('pickedQtySub').textContent) || 0;

            // Calculate Status
            const totalQty = invVal + retVal;
            const grandTotal = totalQty + subVal;

            let status = 'picked';
            // If grandTotal < required, it's effectively PENDING now, not partial
            if (grandTotal < item.quantity_required) status = 'pending';
            else status = 'picked';

            // Check for Pending Substitution
            if (item.pendingSubstitution) {
                try {
                    // 1. Execute Substitution
                    const subRes = await fetch('../api/substitution.php?action=substitute', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(item.pendingSubstitution)
                    });
                    const subData = await subRes.json();

                    if (!subData.success) {
                        alert("Failed to submit substitution: " + (subData.error || 'Unknown Error'));
                        return;
                    }

                    // Clear pending
                    delete item.pendingSubstitution;

                } catch (e) {
                    alert("Network error processing substitution: " + e.message);
                    return;
                }
            }

            // 2. Submit Pick
            submitPick(totalQty, retVal, status);
        }

        function submitPick(qty, retQty, status) {
            const item = items[selectedIndex];
            fetch('../api/picklist.php?action=pick_item', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    item_id: item.item_id,
                    quantity_picked: qty,
                    quantity_return: retQty,
                    status: status,
                    user_id: userId
                })
            }).then(() => {
                // Update local state
                item.status = status;
                item.quantity_picked = qty;
                item.quantity_return = retQty;

                closePickModal();
                renderList();
            });
        }

        function applyFilter(filter) {
            currentFilter = filter;
            renderList();

            // Update buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.dataset.filter === filter) {
                    // Active: Indigo Brand
                    btn.classList.remove('bg-white', 'text-slate-500', 'border', 'border-slate-200', 'hover:bg-slate-50');
                    btn.classList.add('bg-indigo-600', 'text-white', 'shadow-md', 'shadow-indigo-200');
                } else {
                    // Inactive: White
                    btn.classList.add('bg-white', 'text-slate-500', 'border', 'border-slate-200', 'hover:bg-slate-50');
                    btn.classList.remove('bg-indigo-600', 'text-white', 'shadow-md', 'shadow-indigo-200');
                }
            });
        }

        function goToSummary() {
            // Calculate Stats locally
            const total = items.length;
            const notPicked = items.filter(i => ['pending'].includes(i.status)).length;
            const picked = items.filter(i => i.status === 'picked').length;
            // Removed partial count
            // Removed not_found count

            // Populate View
            document.getElementById('sumPicklistId').textContent = picklistId;
            document.getElementById('sumTotal').textContent = total;
            document.getElementById('sumPicked').textContent = picked;
            // document.getElementById('sumPartial').textContent = partial;
            // document.getElementById('sumNotFound').textContent = notFound;
            document.getElementById('sumNotPicked').textContent = notPicked;

            // Toggle Views
            document.getElementById('listView').classList.add('hidden');
            document.getElementById('summaryView').classList.remove('hidden');
        }

        function backToList() {
            document.getElementById('summaryView').classList.add('hidden');
            document.getElementById('listView').classList.remove('hidden');
        }

        function submitPicklistAjax() {
            if (!confirm('Are you sure you want to submit this picklist? This action cannot be undone.')) return;

            fetch('../api/picklist.php?action=complete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ picklist_id: picklistId, user_id: userId })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        // Use ui.showToast if available, or alert
                        if (typeof ui !== 'undefined' && ui.showToast) {
                            ui.showToast('Picklist submitted successfully!', 'success');
                        } else {
                            alert("Picklist submitted successfully!");
                        }
                        setTimeout(() => {
                            window.location.href = 'my-picklists.html';
                        }, 1000);
                    } else {
                        alert("Error submitting picklist: " + (data.error || 'Unknown error'));
                    }
                })
                .catch(err => {
                    console.error('Error:', err);
                    alert('Network error occurred.');
                });
        }

        // --- SUBSTIUTION LOGIC ---
        let selectedSubInv = null;

        function openSubModal() {
            const item = items[selectedIndex];

            // Connected Quantity Logic
            // If user has entered quantities in the pick modal, suggest the remainder.
            const invVal = parseInt(document.getElementById('pickedQtyInv').value) || 0;
            const retVal = parseInt(document.getElementById('pickedQtyRet').value) || 0;
            const alreadySubbed = parseInt(document.getElementById('pickedQtySub').textContent) || 0;

            const currentTotal = invVal + retVal + alreadySubbed;
            const remainder = Math.max(0, item.quantity_required - currentTotal);

            document.getElementById('subOrigSku').textContent = item.sku;
            document.getElementById('subOrigSize').textContent = item.size.toUpperCase();
            document.getElementById('subOrigQty').textContent = remainder; // Suggest remainder, not total pending

            // Reset Form
            document.getElementById('subSearchInput').value = '';
            document.getElementById('subResults').innerHTML = '';
            document.getElementById('subResults').classList.add('hidden');
            document.getElementById('subSelection').classList.add('hidden');
            selectedSubInv = null;

            document.getElementById('subModal').classList.remove('hidden');

            // Auto-load same SKU options
            performSubSearch(item.sku, true);
        }

        function closeSubModal() {
            document.getElementById('subModal').classList.add('hidden');
        }

        function searchSub() {
            const query = document.getElementById('subSearchInput').value;
            if (!query) return;
            performSubSearch(query, false);
        }

        function performSubSearch(query, isAuto = false) {
            const item = items[selectedIndex];

            // If manual search, hide previous selection and show loading or something
            if (!isAuto) {
                document.getElementById('subSelection').classList.add('hidden');
            }

            fetch(`../api/substitution.php?action=search_substitute&query=${encodeURIComponent(query)}&size=${item.size}`)
                .then(res => res.json())
                .then(data => {
                    // It's possible the user closed the modal while fetching
                    const resultsDiv = document.getElementById('subResults');

                    if (isAuto) {
                        // For auto-load, if we find the exact SKU, select it immediately
                        const match = data.find(i => i.sku === item.sku);
                        if (match) {
                            selectSubstitute(match);
                            // Don't show results div if we auto-selected
                            resultsDiv.innerHTML = '';
                            resultsDiv.classList.add('hidden');
                            return;
                        }
                    }

                    resultsDiv.innerHTML = '';
                    resultsDiv.classList.remove('hidden');

                    if (data.length === 0) {
                        resultsDiv.innerHTML = '<div class="p-4 text-gray-500 text-center text-sm">No substitutes found.</div>';
                        return;
                    }

                    data.forEach(inv => {
                        const div = document.createElement('div');
                        div.className = 'p-3 bg-white rounded-lg shadow-sm mb-2 cursor-pointer border border-gray-100 hover:border-indigo-300 transition-all';
                        div.innerHTML = `
            <div class="flex justify-between items-center">
                <div>
                    <div class="font-bold text-gray-900 text-sm">${inv.sku}</div>
                    <div class="text-xs text-gray-500">${inv.category}</div>
                </div>
                <div class="text-right">
                    <div class="font-bold text-xs ${inv[item.size] > 0 ? 'text-green-600' : 'text-red-500'}">
                        Stock (${item.size.toUpperCase()}): ${inv[item.size]}
                    </div>
                    <div class="text-[10px] text-gray-400">${inv.rack_location || 'No Rack'}</div>
                </div>
            </div>
            `;
                        div.onclick = () => selectSubstitute(inv);
                        resultsDiv.appendChild(div);
                    });
                });
        }

        function selectSubstitute(inv) {
            selectedSubInv = inv;
            const item = items[selectedIndex];

            document.getElementById('selSubSku').textContent = inv.sku;
            document.getElementById('subSelection').classList.remove('hidden');

            const sizeSelect = document.getElementById('selSubSize');
            sizeSelect.innerHTML = '';
            ['s', 'm', 'l', 'xl', 'xxl', 'xxxl'].forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.textContent = `${s.toUpperCase()} (Stock: ${inv[s]})`;
                if (s === item.size) opt.selected = true;
                sizeSelect.appendChild(opt);
            });

            // Connected Qty Logic for default value
            const invVal = parseInt(document.getElementById('pickedQtyInv').value) || 0;
            const retVal = parseInt(document.getElementById('pickedQtyRet').value) || 0;
            const alreadySubbed = parseInt(document.getElementById('pickedQtySub').textContent) || 0;
            const currentTotal = invVal + retVal + alreadySubbed;
            const remainder = Math.max(0, item.quantity_required - currentTotal);

            // Set max on input to prevent over-substitution
            const qtyInput = document.getElementById('selSubQty');
            qtyInput.value = remainder;
            qtyInput.max = remainder;

            document.getElementById('selSubQty').value = remainder;
        }

        function confirmSub() {
            if (!selectedSubInv || selectedIndex === -1) return;
            const item = items[selectedIndex];

            const qtyInput = document.getElementById('selSubQty');
            const subQtyVal = parseInt(qtyInput.value) || 0;
            const maxQty = parseInt(qtyInput.max) || 0;

            if (subQtyVal <= 0) {
                alert('Please enter a valid quantity');
                return;
            }

            // Client-side valid check (maxQty is derived from remaining needed)
            // But user might have changed pickedQty in background? No modal is blocking.
            // Re-calc max allowed
            const invVal = parseInt(document.getElementById('pickedQtyInv').value) || 0;
            const retVal = parseInt(document.getElementById('pickedQtyRet').value) || 0;
            const currentSub = parseInt(item.substituted_quantity || 0); // Committed sub
            // We are adding NEW sub. 
            // Total <= Required
            const currentTotal = invVal + retVal + currentSub;
            const allowed = item.quantity_required - currentTotal;

            if (subQtyVal > allowed) {
                alert(`Cannot substitute more than ${allowed}`);
                return;
            }

            const payload = {
                original_item_id: item.item_id,
                substitute_sku: selectedSubInv.sku,
                substitute_size: document.getElementById('selSubSize').value,
                substitute_quantity: subQtyVal,
                reason: document.getElementById('subReason').value || 'Picker Substitution',
                user_id: userId
            };

            // DEFER: Save to local item check
            item.pendingSubstitution = payload;

            // Update UI to reflect this "Pending" substitution
            // We treat pendingSubstitution as if it's real for the display

            // Note: If there was already a pending sub, this overwrites it (one sub per item per session for simplicity?)
            // Or should we append? Let's assume one sub action per pick session for now or complex logic needed.
            // Ideally, we sum them up. But for now, let's just use this one.

            // Update modal display
            const committedSub = parseInt(item.substituted_quantity || 0);
            const totalSub = committedSub + subQtyVal;

            document.getElementById('pickedQtySub').textContent = totalSub;

            let details = item.substituted_details || '';
            if (details) details += ', ';
            details += `${payload.substitute_sku} (${payload.substitute_size}) [PENDING]`;
            document.getElementById('subDetailsText').textContent = details;

            document.getElementById('subCard').classList.remove('hidden');

            closeSubModal();
            updatePickButtonState();
            updateProgress();

            // Don't fetchItemsAndRefreshPickModal - that would wipe our local pending state!
        }

        function fetchItemsAndRefreshPickModal() {
            fetch(`../api/picklist.php?action=items&picklist_id=${picklistId}`)
                .then(res => res.json())
                .then(data => {
                    items = data.sort((a, b) => {
                        if (a.status === 'pending' && b.status !== 'pending') return -1;
                        if (a.status !== 'pending' && b.status === 'pending') return 1;
                        return (a.rack_location || '').localeCompare(b.rack_location || '');
                    });

                    // Refresh List
                    renderList();

                    // Refresh Pick Modal if open
                    if (selectedIndex !== -1) {
                        // We need to re-find the item because arrays might have shifted?
                        // Actually, we sort every time, so index might change if status changed.
                        // But 'pending' -> 'substituted' moves it down?
                        // Let's find by item_id
                        const oldItem = window.currentItemId ? { item_id: window.currentItemId } : items[selectedIndex];
                        const newItemIndex = items.findIndex(i => i.item_id === oldItem.item_id);

                        if (newItemIndex !== -1) {
                            selectedIndex = newItemIndex;
                            openPickModal(selectedIndex); // Re-populate data
                        }
                    }
                });
        }

        function openSubDetails() {
            // Optional: Show more details about the substitution
            // For now, just focus it
            alert('Substitution details would appear here (History/Logs)');
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchItems();
        });
    </script>
