<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" type="image/jpeg" href="img/eazyinventory_logo.jpeg">
    <title>Return Entry | Inventory Manager</title>
    <script src="assets/js/ui.js" defer></script>
    <script src="assets/js/config.js" defer></script>
    <script src="assets/js/return_input.js" defer></script>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/navbar.js" defer></script>
    <style>
        /* Custom Scrollbar for the table */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #c7c7c7;
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
    </style>
</head>

<body class="bg-gray-100">
    <!-- Navbar injected here -->

    <div class="container mx-auto p-2 md:p-4 transition-all duration-300">
        <div class="bg-white rounded-xl shadow-sm p-6 mb-6 glass-card">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-xl md:text-2xl font-bold text-gray-800"><i
                        class="fas fa-undo-alt text-indigo-600 mr-2"></i>Return Entry</h1>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- LEFT COLUMN: Search & Entry Form -->
                <div class="space-y-6">

                    <!-- Search Section -->
                    <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Search Product</label>
                        <div class="relative">
                            <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                            <input type="text" id="skuSearch" placeholder="Type SKU (e.g., KUR...)" autocomplete="off"
                                class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-all shadow-sm uppercase" />
                            <!-- Dropdown Results -->
                            <div id="searchResults"
                                class="absolute z-50 w-full mt-1 bg-white border border-gray-200 rounded-lg shadow-lg max-h-60 overflow-y-auto hidden custom-scrollbar">
                            </div>
                        </div>
                        <p class="text-xs text-gray-500 mt-2"><i class="fas fa-info-circle mr-1"></i>Search by SKU or
                            Product Name</p>
                    </div>

                    <!-- Entry Form -->
                    <form id="returnForm"
                        class="bg-white border border-indigo-100 p-5 rounded-xl shadow-sm relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-1 h-full bg-indigo-500"></div>

                        <h3 class="text-lg font-bold text-gray-800 mb-4">Add Return Item</h3>

                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">SKU</label>
                                <input type="text" id="selectedSku" readonly placeholder="Select a product first"
                                    class="w-full p-2 bg-gray-100 border border-gray-200 rounded-lg text-gray-700 font-medium cursor-not-allowed" />
                                <input type="hidden" id="selectedProductType" />
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div id="sizeContainer">
                                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Size</label>
                                    <select id="selectedSize"
                                        class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-all bg-white">
                                        <option value="" disabled selected>Select Size</option>
                                        <option value="xs">XS</option>
                                        <option value="s">S</option>
                                        <option value="m">M</option>
                                        <option value="l">L</option>
                                        <option value="xl">XL</option>
                                        <option value="xxl">2XL</option>
                                        <option value="xxxl">3XL</option>
                                    </select>
                                </div>

                                <div id="quantityContainer" class="col-span-1">
                                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Quantity</label>
                                    <input type="number" id="returnQty" min="1" placeholder="Qty"
                                        class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-bold text-indigo-600" />
                                </div>
                            </div>

                            <button type="submit" id="addToListBtn"
                                class="w-full bg-indigo-600 text-white py-2.5 rounded-lg hover:bg-indigo-700 transition-colors font-semibold shadow-md flex justify-center items-center gap-2">
                                <i class="fas fa-plus"></i> Add to List
                            </button>
                        </div>
                    </form>

                </div>

                <!-- RIGHT COLUMN: Pending List -->
                <div class="flex flex-col h-full">
                    <div
                        class="bg-white border border-gray-200 rounded-xl shadow-sm flex-1 flex flex-col overflow-hidden h-[500px] lg:h-auto">
                        <div class="p-4 bg-gray-50 border-b border-gray-200 flex justify-between items-center">
                            <h3 class="font-bold text-gray-700">Pending Returns <span id="pendingCount"
                                    class="bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-full text-xs ml-2">0</span>
                            </h3>
                            <button id="clearListBtn"
                                class="text-xs text-red-500 hover:text-red-700 hover:underline">Clear All</button>
                        </div>

                        <div class="flex-1 overflow-y-auto custom-scrollbar p-0">
                            <table class="w-full text-left border-collapse">
                                <thead class="bg-gray-50 sticky top-0 z-10 shadow-sm text-xs uppercase text-gray-500">
                                    <tr>
                                        <th class="p-3 font-semibold">SKU</th>
                                        <th class="p-3 font-semibold text-center">Size</th>
                                        <th class="p-3 font-semibold text-center">Qty</th>
                                        <th class="p-3 font-semibold text-right">Action</th>
                                    </tr>
                                </thead>
                                <tbody id="pendingTableBody" class="divide-y divide-gray-100 text-sm text-gray-700">
                                    <!-- Rows injected here -->
                                    <tr class="text-center text-gray-400 italic">
                                        <td colspan="4" class="p-8">No items added yet.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <div class="p-4 bg-gray-50 border-t border-gray-200">
                            <button id="submitInventoryBtn" onclick="submitInventory()"
                                class="w-full bg-green-600 text-white py-3 rounded-xl hover:bg-green-700 transition-colors font-bold text-lg shadow-lg flex justify-center items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                                <i class="fas fa-check-circle"></i> Add to Inventory
                            </button>
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-[100] flex flex-col gap-2"></div>

</body>

</html>
