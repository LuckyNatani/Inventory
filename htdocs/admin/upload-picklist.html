<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="../img/eazyinventory_logo.jpeg">
    <title>Upload Picklist - Admin</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="../assets/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/ui.js" defer></script>
    <script src="../assets/js/navbar.js" defer></script>
</head>

<body class="bg-gray-100">
    <!-- Navbar injected by navbar.js -->

    <div class="container mx-auto p-4 transition-all duration-300">
        <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-sm p-8 glass-card">
            <h2 class="text-xl md:text-2xl font-bold mb-6 text-gray-800">Upload New Picklist</h2>

            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">Platform</label>
                <select id="uploadPlatformSelect"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                    <option value="Snapdeal">Snapdeal</option>
                    <option value="Myntra">Myntra</option>
                    <option value="Moda">Moda</option>
                    <option value="SZN">SZN</option>
                    <option value="Amazon">Amazon</option>
                    <option value="Flipkart">Flipkart</option>
                    <option value="Meesho">Meesho</option>
                    <option value="Ajio">Ajio</option>
                    <option value="Corsica">Corsica</option>
                    <option value="Others">Others</option>
                </select>
            </div>

            <div class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:bg-gray-50 transition-colors cursor-pointer"
                id="dropZone" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-cloud-upload-alt text-4xl text-gray-400 mb-4"></i>
                <p class="text-gray-600 mb-2">Drag & Drop Excel file here or</p>
                <input type="file" id="fileInput" accept=".xlsx, .xls" class="hidden"
                    onchange="handleFile({target: this})" />
                <button onclick="event.stopPropagation(); document.getElementById('fileInput').click()"
                    class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition-colors shadow-sm">Browse
                    File</button>
                <p class="text-xs text-gray-400 mt-4">Supported formats: .xlsx, .xls</p>
            </div>

            <div id="previewSection" class="hidden mt-8">
                <h3 class="text-lg font-semibold mb-4 text-gray-800">Preview Data</h3>
                <div class="overflow-hidden rounded-lg border border-gray-200">
                    <div class="overflow-x-auto max-h-64">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50 sticky top-0">
                                <tr>
                                    <th
                                        class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        SKU</th>
                                    <th
                                        class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        Size</th>
                                    <th
                                        class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        Qty</th>
                                </tr>
                            </thead>
                            <tbody id="previewBody" class="bg-white divide-y divide-gray-200"></tbody>
                        </table>
                    </div>
                </div>
                <div class="mt-6 flex justify-end gap-4">
                    <button onclick="resetUpload()"
                        class="px-6 py-2 text-gray-600 hover:text-gray-800 hover:bg-gray-100 rounded-lg transition-colors">Cancel</button>
                    <button onclick="confirmUpload()" id="confirmBtn"
                        class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition-colors shadow-sm">Confirm
                        Upload</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let parsedData = [];
        const dropZone = document.getElementById('dropZone');

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('bg-indigo-50', 'border-indigo-300');
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.classList.remove('bg-indigo-50', 'border-indigo-300');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('bg-indigo-50', 'border-indigo-300');
            const files = e.dataTransfer.files;
            if (files.length) handleFile({ target: { files: files } });
        });

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(firstSheet);

                validateAndPreview(jsonData);
            };
            reader.readAsArrayBuffer(file);
        }

        function validateAndPreview(data) {
            parsedData = [];
            const tbody = document.getElementById('previewBody');
            tbody.innerHTML = '';

            data.forEach(row => {
                // Normalize keys (case insensitive)
                // Normalize keys (case insensitive)
                const normalized = {};
                Object.keys(row).forEach(k => normalized[k.toLowerCase()] = row[k]);

                let sku = normalized.sku;
                let size = normalized.size;
                let quantity = normalized.quantity || normalized.qty || 0;

                // Handle Merged SKU (2-column format) if Size is missing
                if (sku && !size && quantity) {
                    const lastUnderscoreIndex = sku.lastIndexOf('_');
                    if (lastUnderscoreIndex > 0) {
                        size = sku.substring(lastUnderscoreIndex + 1);
                        sku = sku.substring(0, lastUnderscoreIndex);
                    }
                }

                if (sku && size && quantity) {
                    parsedData.push({
                        sku: sku,
                        size: size,
                        quantity: quantity
                    });

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                    <td class="px-6 py-4 text-sm text-gray-900 font-medium">${sku}</td>
                    <td class="px-6 py-4 text-sm text-gray-500 uppercase">${size}</td>
                    <td class="px-6 py-4 text-sm text-gray-900">${quantity}</td>
                    `;
                    tbody.appendChild(tr);
                }
            });

            if (parsedData.length > 0) {
                document.getElementById('previewSection').classList.remove('hidden');
                document.getElementById('dropZone').classList.add('hidden');
            } else {
                alert("No valid data found in Excel. Please check headers (SKU, Size, Quantity).");
            }
        }

        function confirmUpload() {
            const btn = document.getElementById('confirmBtn');
            btn.disabled = true;
            btn.textContent = "Uploading...";

            const selectedPlatform = document.getElementById('uploadPlatformSelect').value;

            const payload = {
                platform: selectedPlatform,
                items: parsedData,
                user_id: localStorage.getItem('userId') || 1
            };

            fetch('../api/picklist.php?action=upload', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        alert("Picklist uploaded successfully! ID: " + data.picklist_id);
                        // if (data.warnings && data.warnings.length > 0) {
                        //     alert("Warnings:\n" + data.warnings.join("\n"));
                        // }
                        window.location.href = 'picklists.html';
                    } else {
                        alert("Error: " + data.error);
                        btn.disabled = false;
                        btn.textContent = "Confirm Upload";
                    }
                })
                .catch(err => {
                    console.error(err);
                    alert("Upload failed.");
                    btn.disabled = false;
                    btn.textContent = "Confirm Upload";
                });
        }

        function resetUpload() {
            parsedData = [];
            document.getElementById('fileInput').value = '';
            document.getElementById('previewSection').classList.add('hidden');
            document.getElementById('dropZone').classList.remove('hidden');
        }

        // Logout function is handled by navbar.js now, but keeping for safety if called directly
        function logout() {
            localStorage.clear();
            window.location.href = '../login.html';
        }
    </script>
</body>

</html>
