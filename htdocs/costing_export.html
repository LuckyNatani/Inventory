<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="img/eazyinventory_logo.jpeg">
    <title>SKU Costing Export | Inventory Manager</title>
    <script src="assets/js/ui.js" defer></script>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link rel="stylesheet" href="assets/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/navbar.js" defer></script>
    <!-- SheetJS for Excel Export -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <!-- jsPDF for PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/costing_export.js" defer></script>
</head>

<body class="bg-gray-100">
    <!-- Navbar injected by navbar.js -->

    <div class="container mx-auto p-2 md:p-4 transition-all duration-300 pb-12">
        <div class="bg-white rounded-xl shadow-sm p-3 md:p-6 mb-4 md:mb-6 glass-card">
            <div class="flex flex-col md:flex-row justify-between items-center gap-2 md:gap-4 mb-4 md:mb-6">
                <div>
                    <h1 class="text-xl md:text-2xl font-bold text-gray-800">SKU Costing Export</h1>
                    <p class="text-xs md:text-sm text-gray-500 mt-1">Manage markup and export price lists</p>
                </div>
                <div class="flex gap-3">
                    <button id="whatsappShareBtn"
                        class="bg-green-500 text-white min-w-[35px] h-[55px] px-3 py-1 rounded-lg font-bold hover:bg-green-600 shadow-md transition-colors flex flex-col items-center justify-center gap-1 text-[10px]">
                        <i class="fab fa-whatsapp text-2xl"></i>
                        <span>WhatsApp</span>
                    </button>
                    <button id="exportBtn"
                        class="bg-green-600 text-white min-w-[35px] h-[55px] px-3 py-1 rounded-lg font-bold hover:bg-green-700 shadow-md transition-colors flex flex-col items-center justify-center gap-1 text-[10px]">
                        <i class="fas fa-file-excel text-xl"></i>
                        <span>Selected</span>
                    </button>
                    <button id="exportAllBtn"
                        class="bg-blue-600 text-white min-w-[35px] h-[55px] px-3 py-1 rounded-lg font-bold hover:bg-blue-700 shadow-md transition-colors flex flex-col items-center justify-center gap-1 text-[10px]">
                        <i class="fas fa-file-export text-xl"></i>
                        <span>All</span>
                    </button>
                    <button id="exportPdfBtn"
                        class="bg-red-600 text-white min-w-[35px] h-[55px] px-3 py-1 rounded-lg font-bold hover:bg-red-700 shadow-md transition-colors flex flex-col items-center justify-center gap-1 text-[10px]">
                        <i class="fas fa-file-pdf text-xl"></i>
                        <span>PDF</span>
                    </button>
                </div>
            </div>

            <!-- Search & Actions -->
            <div class="flex flex-col xl:flex-row gap-4 mb-6 items-start xl:items-end">
                <div class="relative flex-1 w-full flex gap-2">
                    <div class="relative flex-1">
                        <i class="fas fa-search absolute left-4 top-3.5 text-gray-400"></i>
                        <input type="text" id="searchInput" placeholder="Search SKU or Product Name..."
                            class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm h-[50px]">
                    </div>
                    <div class="w-1/3 md:w-1/4">
                        <select id="categoryFilter"
                            class="w-full h-[50px] px-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm bg-white">
                            <option value="">All Categories</option>
                            <!-- Injected by JS -->
                        </select>
                    </div>
                </div>

                <label
                    class="flex items-center gap-2 h-[50px] px-4 bg-white border border-gray-300 rounded-xl cursor-pointer hover:bg-gray-50 transition-colors">
                    <input type="checkbox" id="showSelectedCheck"
                        class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                    <span class="text-sm font-medium text-gray-700 whitespace-nowrap">Show Selected</span>
                </label>

                <!-- Bulk Controls (Desktop: Row, Mobile: Stack) -->
                <div
                    class="bg-indigo-50 p-3 rounded-xl border border-indigo-100 flex flex-wrap gap-3 items-center h-auto xl:h-[50px] w-full xl:w-auto">
                    <div>
                        <div class="flex gap-1 items-center">
                            <input type="number" id="bulkMarkup" placeholder="Markup %"
                                class="w-24 p-2 border border-indigo-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500 h-[36px]">
                            <button id="applyBulkMarkup"
                                class="bg-indigo-600 text-white px-3 h-[36px] rounded-lg hover:bg-indigo-700 text-xs font-bold"
                                title="Apply to Selected">Apply</button>
                        </div>
                    </div>
                    <div class="w-px h-8 bg-indigo-200 hidden md:block"></div>
                    <div>
                        <div class="flex gap-1 items-center">
                            <input type="number" id="bulkExtra" placeholder="Extra ?"
                                class="w-24 p-2 border border-indigo-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500 h-[36px]">
                            <button id="applyBulkExtra"
                                class="bg-indigo-600 text-white px-3 h-[36px] rounded-lg hover:bg-indigo-700 text-xs font-bold"
                                title="Apply to Selected">Apply</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-2 mb-2">
                <span id="selectedCount" class="text-xs font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded">0
                    Selected</span>
            </div>

            <!-- Data Table -->
            <div class="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm">
                <div class="overflow-x-auto max-h-[650px] overflow-y-auto">
                    <table class="min-w-full divide-y divide-gray-200 relative">
                        <thead class="bg-gray-50 sticky top-0 z-10 shadow-sm">
                            <tr>
                                <th class="px-4 py-3 text-left w-10">
                                    <input type="checkbox" id="selectAllBtn"
                                        class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                                </th>
                                <th
                                    class="px-4 py-3 text-left text-xs font-bold text-gray-600 uppercase tracking-wider w-16">
                                    Image</th>
                                <th
                                    class="px-4 py-3 text-left text-xs font-bold text-gray-600 uppercase tracking-wider">
                                    SKU Details</th>
                                <th
                                    class="px-4 py-3 text-right text-xs font-bold text-gray-600 uppercase tracking-wider w-24">
                                    Cost (?)</th>
                                <th
                                    class="px-4 py-3 text-center text-xs font-bold text-gray-600 uppercase tracking-wider w-28">
                                    Markup %</th>
                                <th
                                    class="px-4 py-3 text-center text-xs font-bold text-gray-600 uppercase tracking-wider w-28">
                                    Extra (?)</th>
                                <th
                                    class="px-4 py-3 text-right text-xs font-bold text-gray-600 uppercase tracking-wider w-32 border-l border-gray-200 bg-indigo-50/50">
                                    Final Price</th>
                            </tr>
                        </thead>
                        <tbody id="costingTableBody" class="bg-white divide-y divide-gray-200">
                            <!-- Rows injected via JS -->
                            <tr>
                                <td colspan="7" class="text-center py-8 text-gray-500">Loading data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Pagination Controls -->
            <div
                class="flex flex-col sm:flex-row justify-between items-center mt-4 pt-4 border-t border-gray-100 gap-4 sm:gap-0">
                <div class="text-sm text-gray-500">
                    Showing <span id="pageStart" class="font-medium text-gray-900">0</span> to <span id="pageEnd"
                        class="font-medium text-gray-900">0</span> of <span id="totalItems"
                        class="font-medium text-gray-900">0</span> items
                </div>
                <div class="flex gap-2">
                    <button id="prevPageBtn" disabled
                        class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                        Previous
                    </button>
                    <span
                        class="flex items-center px-3 py-1.5 text-sm font-medium text-gray-700 bg-gray-50 rounded-lg border border-gray-200">
                        Page <span id="currentPageNum" class="mx-1 font-bold">1</span> of <span
                            id="totalPagesNum">1</span>
                    </span>
                    <button id="nextPageBtn" disabled
                        class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                        Next
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="imageModal"
        class="fixed inset-0 bg-black bg-opacity-75 flex justify-center items-center hidden z-50 backdrop-blur-sm">
        <div class="relative">
            <img id="modalImage" class="max-h-[85vh] rounded-lg shadow-2xl" />
            <button id="closeModal"
                class="absolute -top-10 right-0 text-white text-2xl hover:text-gray-300 transition-colors">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>
</body>

</html>
